// ─── MOC DATA ─────────────────────────────────────────────────────────────────
const SPECIALTY_MOC = {
  internal_med:     { boards:"ABIM (MOC Part II)", flag:"Your physician attendees who hold ABIM certification may be able to claim Maintenance of Certification (MOC) credit for this activity. This requires a specific type of evaluation — flag this to the OCME&LL and ask whether a pre/post knowledge assessment should be added." },
  anesthesiology:   { boards:"ABA (MOCA 2.0®)", flag:"Anesthesiologists may claim ABA MOCA 2.0® Lifelong Learning credit. If your activity covers patient safety topics — especially themes that apply across clinical settings, not just anesthesia — there may also be a separate ABA Patient Safety CME designation available. Mention both to your OCME&LL representative." },

  surgery:          { boards:"ABOS / ABS / ABTS", flag:"Surgeons (orthopaedic, general, thoracic) may claim board credit through their respective certifying boards. Mention the surgical subspecialties in your audience to your OCME&LL representative so the right boards are registered." },
  ob_gyn:           { boards:"ABOG Continuing Certification", flag:"OB/GYN physicians may claim ABOG board credit. Your OCME&LL representative will handle registration." },

  emergency_med:    { boards:"ABEM Continuing Certification", flag:"Emergency medicine physicians may be eligible for credit toward ABEM continuing certification. Your OCME&LL representative will confirm the current requirements for this board." },
  multi_specialty:  { boards:"Multiple boards (ABIM, ABFM, ABP, ABPN and others)", flag:"With a multi-specialty audience, several board certification programs may apply. Let your OCME&LL representative know all the specialties represented — they will identify which boards to register with." },
  other_specialty:  { boards:null, flag:null },
};

// ─── COMMENDATION DATA ────────────────────────────────────────────────────────
const COMMENDATION = [
  {
    category:"Team-Based & Interprofessional Education",
    color:tk.purple, colorLight:tk.purpleLight, colorBorder:tk.purpleBorder, icon:"🤝",
    whyItMatters:"Activities that bring different professions together in planning and delivery are a foundation of your organization's Accreditation with Commendation. Flag any of these to your OCME&LL representative.",

    options:[
      { value:"hybrid_inperson", icon:"🏛️", label:"In-person attendees on the day" },
      { value:"hybrid_livestream", icon:"📡", label:"Live stream for remote participants joining as it happens" },
      { value:"hybrid_enduring", icon:"🎬", label:"Recording made publicly available afterward (anyone can access, not just registered attendees)" },
      { value:"hybrid_enduring_bundled", icon:"🔒", label:"Recording available only to people who already registered" },
    ]
  },
  {
    id:"target_specialty",
    question:"Who is the primary physician audience?",
    hint:"This determines whether your attendees may be eligible for Maintenance of Certification (MOC) / board credit in addition to standard CME.",
    type:"single",
    options:[
      { value:"internal_med", label:"Internal Medicine or subspecialties (cardiology, GI, rheumatology, etc.)" },
      { value:"anesthesiology", label:"Anesthesiology, Pain Medicine, or Critical Care" },
      { value:"family_med", label:"Family Medicine" },
      { value:"pediatrics", label:"Pediatrics" },
      { value:"psychiatry_neuro", label:"Psychiatry or Neurology" },
      { value:"surgery", label:"Surgery — General, Orthopaedic, Thoracic, or Vascular" },
      { value:"ob_gyn", label:"Obstetrics & Gynecology" },
      { value:"radiology", label:"Radiology or Radiation Oncology" },
      { value:"emergency_med", label:"Emergency Medicine" },
      { value:"multi_specialty", label:"Mixed or multi-specialty audience" },
      { value:"other_specialty", label:"Another specialty" },
    ]
  },
  {

    question:"Which professional groups will attend? Select all that apply.",
    hint:"If nurses, pharmacists, or other healthcare professionals attend, additional credit types may be available for them — beyond standard physician CME.",
    type:"multi",
    options:[
      { value:"physicians", label:"Physicians (MD or DO)" },
      { value:"nurses", label:"Nurses (RN, NP, CRNA)" },
      { value:"pharmacists", label:"Pharmacists" },
      { value:"pas", label:"Physician Assistants / Physician Associates" },
      { value:"psychologists", label:"Psychologists" },
      { value:"social_workers", label:"Social Workers" },

      { value:"other_hcp", label:"Other healthcare professionals" },
    ]
  },
  {

    hint:"Be generous — select everything that fits. The more you flag now, the more credit opportunities your OCME&LL representative can identify.",
    type:"multi",
    options:[
      { value:"clinical_knowledge", label:"🧬 Clinical knowledge update — new evidence, guidelines, or treatments" },
      { value:"procedural", label:"🔧 A specific procedure, technique, or clinical skill" },
      { divider:"High-value designations — unlock additional credit types" },
      { value:"patient_safety", label:"🛡️ Patient safety or preventing medical errors" },
      { value:"qi_activity", label:"📊 Quality improvement or reducing variation in care" },
      { divider:"Audience & communication focus" },
      { value:"communication", label:"💬 Communication skills — with patients, families, or care teams" },
      { value:"mental_health", label:"🧠 Mental health or behavioral health" },
      { divider:"Population health & equity" },
      { value:"population_health", label:"🌍 Population health, public health, or community health" },
      { value:"sdoh", label:"⚖️ Health equity, disparities, or social determinants of health" },
      { divider:"Specialty topics — also satisfy Michigan mandatory requirements" },
      { value:"pain_management", label:"💊 Pain management, symptom management, or opioid prescribing" },
      { value:"ethics", label:"⚕️ Medical ethics" },

  },

      { value:"pre_post", label:"A knowledge test before and after", sublabel:"Attendees answer questions before the activity and again afterward to measure learning" },
      { value:"performance_outcome", label:"Measuring whether clinical practice actually changed", sublabel:"Follow-up data collected weeks or months later showing attendees did something differently" },
      { value:"patient_outcome", label:"Measuring impact on patients or care quality", sublabel:"Data showing the activity led to better patient outcomes or improved quality metrics" },
      { value:"self_assessment_format", label:"A formal self-assessment or reflective practice component", sublabel:"Participants assess their own competency or create a personal learning plan" },
    ]
  },
  {

    hint:"Planning details unlock commendation criteria that are often missed — take a moment to check everything that applies.",
    type:"multi",
    options:[

      { value:"multi_org", label:"Another organization (outside your department or institution) is involved" },

      { value:"none", label:"No follow-up planned" },
      { value:"follow_up", label:"A follow-up survey, reminder, or resource sent to attendees afterward" },
      { value:"performance_improvement", label:"Structured coaching, a PI component, or support to help attendees change their practice" },

      { value:"mi_pain", label:"💊 Pain & Symptom Management — Michigan requires at least 3 hours per cycle (including at least 1 hour on controlled substances)" },

      { value:"mi_opioid", label:"🚨 Opioid / Controlled Substance Awareness — required for prescribers and dispensers every renewal period" },
      { value:"mi_human_trafficking", label:"🔴 Human Trafficking Identification — one-time requirement for Michigan physicians" },
      { value:"mi_none", label:"None of these" },

// ─── LOGIC ────────────────────────────────────────────────────────────────────
function deriveResults(answers) {
  const a = answers;
  const res = { application:[], additionalCredits:[], boardCredit:null, commendation:[], michigan:[], flags:[] };

  const isRSS = a.activity_structure === "rss";
  const isRepeated = a.activity_structure === "repeated";
  const isSingle = a.activity_structure === "single";
  const fmt = a.delivery_format;
  const isHybrid = fmt === "hybrid";
  const isEnduring = fmt === "enduring";
  const isSimulation = fmt === "simulation";
  const isLive = fmt === "live";

  const hybridComponents = a.hybrid_components || [];
  const hasPublicRecording = hybridComponents.includes("hybrid_enduring");
  const hasLiveStream = hybridComponents.includes("hybrid_livestream");
  const hasBundledRecording = hybridComponents.includes("hybrid_enduring_bundled");

  const content = a.content_focus || [];
  const hasPatientSafety = content.includes("patient_safety");
  const hasQI = content.includes("qi_activity");
  const profs = a.audience_professions || [];
  const planning = a.planning_process || [];
  const followUp = a.follow_up || [];
  const evalMethod = a.evaluation_plan;

  // ── APPLICATION TYPE ──
  let appType = "", appNote = "", appAction = "";

  if (isRSS) {
    appType = "Regularly Scheduled Series (RSS)";
    appNote = "A Regularly Scheduled Series is registered as a single series — not as individual events. Your OCME&LL representative will register the whole series with one application. Each individual session date needs to be logged, and attendance must be tracked per session.";
    appAction = "Contact your OCME&LL representative to register the series before the first session. Keep attendance records for every individual session throughout the year.";
  } else if (isRepeated) {
    appType = "Live Course — Repeated (separate application per run)";
    appNote = "Because you are running the same course multiple times, each run requires its own separate CME application — even if the content, faculty, and credit hours are completely identical. This is an ACCME requirement. Plan ahead: if you are running this course 4 times, you will need 4 separate applications.";
    appAction = "Submit a separate application to OCME&LL for each individual run of the course. Keep separate attendance records and evaluation forms for each run.";
  } else {
    if (isLive) { appType = "Live Activity"; appNote = "A standard in-person event. One application covers all in-person attendees."; appAction = "Submit one CME application to OCME&LL for this event."; }
    else if (isHybrid) { appType = "Live Activity (with online components)"; appNote = "See the application note below about hybrid events."; appAction = "Contact your OCME&LL representative — the number of applications needed depends on whether a recording will be publicly released."; }
    else if (isEnduring) { appType = "Enduring Material (online/self-paced)"; appNote = "An enduring material is self-paced with no live component. The credit period typically cannot exceed 3 years, and learners must complete the evaluation before receiving credit."; appAction = "Submit an Enduring Material application to OCME&LL."; }
    else if (isSimulation) { appType = "Live Activity — Simulation-Based"; appNote = "Simulation activities are accredited as live activities. One application covers each session."; appAction = "Submit a Live Activity application to OCME&LL for this session."; }
  }
  res.application.push({ appType, appNote, appAction });

  // ── HYBRID APPLICATION NOTE ──
  if (isHybrid) {
    const parts = [
      "In-person and live-streamed attendees on the day are covered under a single Live Activity application.",
      hasPublicRecording ? "⚠️ Because the recording will be publicly released to anyone (beyond just registered attendees), this creates a SECOND activity — an Enduring Material — which needs its own separate CME application, its own evaluation, and its own credit designation. Alert your OCME&LL representative to this as early as possible." : null,
      hasBundledRecording ? "A recording available only to people who already registered is generally treated as part of the original live activity and does not require a separate application — but confirm this with your OCME&LL representative if access will extend beyond 30 days after the event." : null,
      isRepeated ? "Because this is a repeated course, each run will need its own application for both the live and (if applicable) the enduring recording component." : null,
    ].filter(Boolean);
    res.application.push({ isHybridNote:true, parts });
  }

  // ── ADDITIONAL CREDITS ──
  if (profs.includes("nurses")) {
    res.additionalCredits.push({ icon:"🏥", label:"Nursing CE (ANCC Contact Hours)", who:"For nurses (RN, NP, CRNA)", why:"Nurses have their own CE credit system — ANCC Contact Hours — separate from physician CME. If nurses are attending, they may be able to earn nursing CE credit, which counts toward their licensure requirements.", flag:"Ask your OCME&LL representative whether your organization can offer ANCC Contact Hours for this activity, or whether a jointly accredited provider is needed.", priority:"high" });
  }
  if (profs.includes("pharmacists")) {
    res.additionalCredits.push({ icon:"💊", label:"Pharmacy CE (ACPE Credit)", who:"For pharmacists", why:"Pharmacists earn continuing pharmacy education (CPE) credit through ACPE — not physician CME. If pharmacists are attending, this is a separate credit type they need for licensure renewal.", flag:"Let your OCME&LL representative know pharmacists will attend. Offering ACPE credit typically requires Joint Accreditation status.", priority:"high" });
  }
  if (profs.includes("pas")) {
    res.additionalCredits.push({ icon:"👩‍⚕️", label:"PA CME (AAPA Category 1 Credit)", who:"For Physician Assistants / Physician Associates", why:"PAs need AAPA Category 1 CME credit — this is different from standard AMA physician CME. Many accredited activities already qualify, but it needs to be officially designated.", flag:"Mention to your OCME&LL representative that PAs will attend and ask about designating AAPA Category 1 credit.", priority:"medium" });
  }

  // IPCE
  const nonPhysProfs = profs.filter(p=>!["physicians","residents_fellows","students"].includes(p));
  const hasInterprofPlanning = planning.includes("multi_prof");
  if (nonPhysProfs.length >= 1 && hasInterprofPlanning) {
    res.additionalCredits.push({ icon:"🤝", label:"IPCE Credit Mark (Interprofessional Continuing Education)", who:"For all professions attending together", why:"When an activity is planned AND delivered interprofessionally — meaning multiple professions are involved in both the planning committee and the learning itself — it can receive a special IPCE (Interprofessional Continuing Education) designation. This is a significant distinction that sets the activity apart.", flag:"Flag this to your OCME&LL representative. The IPCE credit mark requires Joint Accreditation and an interprofessional planning committee — both of which you appear to have.", priority:"high" });
  } else if (nonPhysProfs.length >= 1 && !hasInterprofPlanning) {
    res.flags.push("Multiple professions are attending, but the planning committee appears to be single-profession. If you can involve a nurse, pharmacist, or other professional in the planning process, you may qualify for the IPCE Credit Mark — a meaningful distinction. Mention this possibility to your OCME&LL representative.");
  }

  // ABA Patient Safety
  if (a.target_specialty === "anesthesiology" && hasPatientSafety) {
    res.additionalCredits.push({ icon:"🛡️", label:"ABA MOCA 2.0® Patient Safety CME Credit", who:"For anesthesiology audiences", why:"For anesthesiology activities that include cross-disciplinary patient safety content, there is a separate ABA Patient Safety CME designation available — in addition to standard MOCA 2.0® credit. Anesthesiologists self-report this credit using their 8-digit ABA ID.", flag:"Flag this to your OCME&LL representative and make sure the patient safety content is clearly described in your application. This is a separate, additional credit on top of standard MOCA credit.", priority:"high" });
  }

  // ── BOARD CREDIT (MOC) ──
  const mocInfo = SPECIALTY_MOC[a.target_specialty];
  if (mocInfo && mocInfo.boards) {
    const needsRobustEval = a.target_specialty === "internal_med";
    const hasRobustEval = ["pre_post","performance_outcome","patient_outcome","self_assessment_format"].includes(evalMethod);
    res.boardCredit = {
      boards: mocInfo.boards,
      flag: mocInfo.flag,
      evalWarning: needsRobustEval && !hasRobustEval
        ? "Important: for ABIM MOC credit specifically, a satisfaction survey alone is not sufficient. A pre/post knowledge assessment or outcomes measurement is required. Ask your OCME&LL representative about adding this to your evaluation plan."
        : null,
    };
  }

  // ── COMMENDATION ──
  const allTriggers = [...content, ...planning, ...followUp, fmt, evalMethod].filter(Boolean);
  COMMENDATION.forEach(cat => {
    const matched = cat.criteria.filter(cr => cr.triggers.some(tr => allTriggers.includes(tr)));
    if (matched.length > 0) {
      res.commendation.push({ ...cat, matched });
    }
  });

  // ── MICHIGAN ──
  const mi = a.michigan_topics || [];
  if (mi.includes("mi_ethics")) res.michigan.push({ icon:"⚕️", label:"Medical Ethics", req:"At least 1 hour required per 3-year cycle", note:"Designate this on your application and mention it to your OCME&LL representative so it is flagged correctly in the system." });
  if (mi.includes("mi_pain")) res.michigan.push({ icon:"💊", label:"Pain & Symptom Management", req:"At least 3 hours required per cycle (including at least 1 hour on controlled substances)", note:"Make sure your application clearly describes the controlled substance content. Your OCME&LL representative will flag this appropriately." });
  if (mi.includes("mi_implicit_bias")) res.michigan.push({ icon:"🤝", label:"Implicit Bias Training", req:"1 hour per year of the license cycle (required since June 2021)", note:"Designate this on your application. Your OCME&LL representative will ensure it is correctly coded." });
  if (mi.includes("mi_opioid")) res.michigan.push({ icon:"🚨", label:"Opioid / Controlled Substance Awareness", req:"Required every renewal period for prescribers and dispensers (since May 2024)", note:"Flag this explicitly on your application. This is a prescriber requirement and must be clearly designated." });
  if (mi.includes("mi_human_trafficking")) res.michigan.push({ icon:"🔴", label:"Human Trafficking Identification", req:"One-time requirement for Michigan physicians", note:"Flag this on your application. Physicians who have not yet completed this one-time requirement can use your activity to fulfill it." });

  // ── GENERAL FLAGS ──
  if (planning.includes("needs_assessment")) res.flags.push("You conducted a formal needs assessment — include this documentation with your application. It strengthens your application and supports several commendation criteria.");
  if (evalMethod === "survey_only" && (hasQI || hasPatientSafety)) res.flags.push("Your activity covers quality improvement or patient safety content, but your evaluation is a satisfaction survey only. A pre/post knowledge test or outcomes measure would unlock additional credit types and commendation opportunities — worth discussing with your OCME&LL representative.");
  if (isRepeated) res.flags.push("Remember: each run of this course needs its own separate application, even if the content is identical. Plan your application timeline accordingly — submit each application before that run's date.");
  if (isRSS && isHybrid && hasPublicRecording) res.flags.push("For your RSS: each time a session recording is publicly released, a separate Enduring Material application is needed for that recording. Discuss the workflow for this with your OCME&LL representative upfront.");

  return res;
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────────
function getVisibleQuestions(answers) {
  return QUESTIONS.filter(q => !q.showIf || q.showIf(answers));
}

function Chip({ children, color, bg, border }) {
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:"4px", background:bg||tk.brandLight, color:color||tk.brand, border:`1px solid ${border||tk.brandBorder}`, borderRadius:"20px", padding:"2px 10px", fontSize:"12px", fontWeight:"600", whiteSpace:"nowrap" }}>

function SectionHeader({ icon, title, color, count }) {

function InfoBox({ children, color, bg, border, icon }) {

function Card({ children, style={}, accent, accentWidth=4 }) {

// ─── QUESTION STEP ─────────────────────────────────────────────────────────────
function QuestionStep({ q, value, onChange, onNext, onBack, stepNum, total }) {
  const isMulti = q.type === "multi";
  const selected = isMulti ? (value || []) : value;
  const selectableOptions = q.options.filter(o => !o.divider);
  const canProceed = isMulti ? (selected && selected.length > 0) : !!selected;

  const toggle = (v) => {
    if (!isMulti) { onChange(v); return; }
    if (selected.includes(v)) onChange(selected.filter(x => x !== v));
    else onChange([...selected, v]);
  };

  const progress = Math.round((stepNum / total) * 100);

  return (
    <div style={{ animation:"fadeUp 0.2s ease" }}>
      {/* Progress */}
      <div style={{ marginBottom:"24px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"8px" }}>
          <span style={{ fontSize:"13px", color:tk.textLight, fontWeight:"500" }}>Question {stepNum} of {total}</span>
          <span style={{ fontSize:"13px", color:tk.brand, fontWeight:"600" }}>{progress}% complete</span>
        </div>
        <div style={{ height:"6px", background:tk.border, borderRadius:"3px", overflow:"hidden" }}>
          <div style={{ height:"100%", width:`${progress}%`, background:`linear-gradient(90deg,${tk.brand},#3b82f6)`, borderRadius:"3px", transition:"width 0.4s ease" }} />
        </div>
      </div>

      {/* Question */}
      <h2 style={{ fontSize:"21px", fontWeight:"700", color:tk.text, marginBottom:"6px", lineHeight:"1.3" }}>{q.question}</h2>
      {q.hint && <p style={{ fontSize:"14px", color:tk.textLight, marginBottom:"20px", lineHeight:"1.6" }}>{q.hint}</p>}
      {isMulti && (
        <div style={{ display:"inline-flex", alignItems:"center", gap:"6px", background:tk.brandLight, color:tk.brand, border:`1px solid ${tk.brandBorder}`, borderRadius:"8px", padding:"5px 12px", fontSize:"13px", fontWeight:"600", marginBottom:"14px" }}>
          ☑ Select all that apply
        </div>
      )}

      {/* Options */}
      <div style={{ display:"flex", flexDirection:"column", gap:"8px", marginBottom:"28px" }}>
        {q.options.map((opt, idx) => {
          if (opt.divider) return (
            <div key={idx} style={{ display:"flex", alignItems:"center", gap:"8px", margin:"4px 0 2px" }}>
              <div style={{ flex:1, height:"1px", background:tk.border }} />
              <span style={{ fontSize:"11px", fontWeight:"600", color:tk.textLight, whiteSpace:"nowrap", letterSpacing:"0.3px", textTransform:"uppercase" }}>{opt.divider}</span>
              <div style={{ flex:1, height:"1px", background:tk.border }} />
            </div>
          );
          const active = isMulti ? selected.includes(opt.value) : selected === opt.value;
          return (
            <button key={opt.value} onClick={() => toggle(opt.value)} style={{
              display:"flex", alignItems:"center", gap:"14px", padding:"14px 16px",
              borderRadius:"10px", textAlign:"left", cursor:"pointer", fontFamily:"inherit",
              border: active ? `2px solid ${tk.brand}` : `2px solid ${tk.border}`,
              background: active ? tk.brandLight : tk.white,
              transition:"all 0.15s", boxShadow: active ? `0 0 0 3px ${tk.brand}22` : "none",
            }}>
              {/* Checkbox/radio */}
              <div style={{ width:"20px", height:"20px", borderRadius:isMulti?"5px":"50%", border:`2px solid ${active?tk.brand:tk.textLight}`, background:active?tk.brand:"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"all 0.15s" }}>
                {active && <span style={{ color:"white", fontSize:"12px", fontWeight:"700" }}>✓</span>}
              </div>
              {opt.icon && <span style={{ fontSize:"20px", flexShrink:0 }}>{opt.icon}</span>}
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", alignItems:"center", gap:"8px", flexWrap:"wrap" }}>
                  <span style={{ fontSize:"15px", fontWeight:"600", color: active ? tk.brand : tk.text }}>{opt.label}</span>
                  {opt.tag && <span style={{ fontSize:"11px", fontWeight:"700", color: active ? tk.brand : tk.textLight, background: active ? tk.brandLight : "#f1f5f9", border:`1px solid ${active ? tk.brandBorder : tk.border}`, borderRadius:"5px", padding:"1px 7px", letterSpacing:"0.2px", whiteSpace:"nowrap" }}>{opt.tag}</span>}
                </div>
                {opt.sublabel && <div style={{ fontSize:"13px", color:tk.textLight, marginTop:"3px", lineHeight:"1.4" }}>{opt.sublabel}</div>}
              </div>
            </button>
          );
        })}
      </div>

      {/* Nav */}
      <div style={{ display:"flex", gap:"10px" }}>
        {onBack && (
          <button onClick={onBack} style={{ padding:"11px 20px", borderRadius:"8px", border:`2px solid ${tk.border}`, background:tk.white, color:tk.textMid, cursor:"pointer", fontFamily:"inherit", fontSize:"14px", fontWeight:"600" }}>
            ← Back
          </button>
        )}
        <button onClick={onNext} disabled={!canProceed} style={{
          padding:"11px 28px", borderRadius:"8px", border:"none",
          background: canProceed ? `linear-gradient(135deg,${tk.brand},#2563eb)` : tk.border,
          color: canProceed ? tk.white : tk.textLight,
          cursor: canProceed ? "pointer" : "not-allowed",
          fontFamily:"inherit", fontSize:"15px", fontWeight:"700",
          boxShadow: canProceed ? "0 4px 12px rgba(29,78,216,0.3)" : "none",
          transition:"all 0.15s",
        }}>
          {stepNum === total ? "See My Results →" : "Next →"}
        </button>
      </div>
    </div>
  );
}

        <div style={{ display:"flex", flexDirection:"column", gap:"14px", animation:"fadeUp 0.2s ease" }}>
          <InfoBox icon="🏔️" bg={tk.brandLight} border={tk.brandBorder}>
            <strong>Michigan Mandatory CME Topics:</strong> Michigan physicians must complete specific hours in each of these areas within their 3-year licensure cycle. If your activity covers any of these topics, flag them on your application — your OCME&LL representative will ensure they are designated correctly, and Michigan physicians will be able to use your activity to meet their mandatory requirements.
          </InfoBox>
          {res.michigan.length === 0 ? (
            <Card><p style={{ color:tk.textLight, fontSize:"14px" }}>No Michigan mandatory topics were identified for this activity.</p></Card>
          ) : (
            res.michigan.map((m,i) => (
              <Card key={i} accent={tk.brand}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:"8px", marginBottom:"8px" }}>
                  <div style={{ fontSize:"17px", fontWeight:"700", color:tk.text }}>{m.icon} {m.label}</div>
                  <Chip>{m.req}</Chip>
                </div>
                <InfoBox icon="💬" bg={tk.greenLight} border={tk.greenBorder}><strong>Flag to OCME&LL:</strong> {m.note}</InfoBox>
              </Card>
            ))
          )}
        </div>
      )}

      {/* Footer */}
      <div style={{ marginTop:"28px", display:"flex", gap:"10px", flexWrap:"wrap" }} className="no-print">
        <button onClick={onRestart} style={{ padding:"10px 20px", borderRadius:"8px", border:`2px solid ${tk.border}`, background:tk.white, color:tk.textMid, cursor:"pointer", fontFamily:"inherit", fontSize:"14px", fontWeight:"600" }}>← Start Over</button>
        <button onClick={() => window.print()} style={{ padding:"10px 20px", borderRadius:"8px", border:`2px solid ${tk.brandBorder}`, background:tk.brandLight, color:tk.brand, cursor:"pointer", fontFamily:"inherit", fontSize:"14px", fontWeight:"600" }}>🖨 Print This Page</button>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function CMENavigator() {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [done, setDone] = useState(false);

  const visibleQs = getVisibleQuestions(answers);
  const currentQ = visibleQs[step - 1];

  const handleNext = () => {
    if (step === visibleQs.length) { setDone(true); return; }
    setStep(s => s + 1);
  };
  const handleBack = () => setStep(s => s - 1);
  const handleRestart = () => { setStep(0); setAnswers({}); setDone(false); };

  const handleChange = (qId, value) => {
    setAnswers(prev => {
      const next = { ...prev, [qId]: value };
      if (qId === "delivery_format" && value !== "hybrid") delete next.hybrid_components;
      return next;
    });
  };

  return (
    <div style={{ minHeight:"100vh", background:tk.bg }}>
      {/* Header */}
      <div style={{ background:`linear-gradient(135deg,${tk.brandDark},${tk.brand})`, padding:"16px 24px", display:"flex", alignItems:"center", gap:"14px", boxShadow:"0 2px 8px rgba(0,0,0,0.15)" }}>
        <div style={{ width:"38px", height:"38px", background:"rgba(255,255,255,0.15)", borderRadius:"10px", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"20px", flexShrink:0 }}>⚕</div>
        <div>
          <div style={{ fontWeight:"800", fontSize:"16px", color:"#fff", letterSpacing:"-0.2px" }}>CME Credit Application Navigator</div>
          <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.7)", marginTop:"1px" }}>Office of CME & Lifelong Learning (OCME&LL)</div>
        </div>
        {step > 0 && !done && (
          <div style={{ marginLeft:"auto", fontSize:"13px", color:"rgba(255,255,255,0.8)", fontWeight:"600" }} className="no-print">
            Step {step} of {visibleQs.length}
          </div>
        )}
      </div>

      {/* Content */}
      <div style={{ maxWidth:"680px", margin:"0 auto", padding:"32px 20px 60px" }}>

        {/* Welcome */}
        {step === 0 && (
          <div style={{ animation:"fadeUp 0.35s ease" }}>
            <div style={{ textAlign:"center", marginBottom:"32px" }}>
              <div style={{ fontSize:"52px", marginBottom:"16px" }}>🧭</div>
              <h1 style={{ fontSize:"28px", fontWeight:"800", color:tk.text, marginBottom:"12px", lineHeight:"1.2" }}>
                CME Credit Application Navigator
              </h1>
              <p style={{ fontSize:"15px", color:tk.textMid, lineHeight:"1.8", maxWidth:"500px", margin:"0 auto 20px" }}>
                Answer a few questions about your planned activity and we'll tell you exactly what to include on your application — and what to flag to your OCME&LL representative.
              </p>
              <div style={{ display:"flex", flexWrap:"wrap", justifyContent:"center", gap:"6px", marginBottom:"28px" }}>
                {["What application type you need","Which credits to apply for","Board certification (MOC) credit","Nursing, pharmacy & PA credit","Commendation criteria to flag","Michigan mandatory topics"].map(t => (
                  <span key={t} style={{ fontSize:"12px", color:tk.textLight, background:tk.white, border:`1px solid ${tk.border}`, borderRadius:"20px", padding:"4px 12px" }}>{t}</span>
                ))}
              </div>
            </div>

            <Card style={{ marginBottom:"16px", background:`linear-gradient(135deg,${tk.brandLight},#e0e7ff)`, border:`1px solid ${tk.brandBorder}` }}>
              <div style={{ display:"flex", gap:"12px", alignItems:"flex-start" }}>
                <span style={{ fontSize:"22px" }}>👋</span>
                <div>
                  <div style={{ fontWeight:"700", fontSize:"15px", color:tk.brandDark, marginBottom:"4px" }}>Designed for Educational Planners and Administrators</div>
                  <p style={{ fontSize:"13px", color:tk.textMid, lineHeight:"1.65" }}>
                    Whether you are completing the application yourself or working with your <strong>OCME&LL representative</strong>, this tool will help you understand what credits to apply for, what information to include, and what to flag to get the most out of your activity.
                  </p>
                </div>
              </div>
            </Card>

            <div style={{ textAlign:"center" }}>
              <button onClick={() => setStep(1)} style={{
                padding:"14px 44px", borderRadius:"10px", border:"none",
                background:`linear-gradient(135deg,${tk.brandDark},${tk.brand})`,
                color:"#fff", fontSize:"16px", fontWeight:"700",
                cursor:"pointer", fontFamily:"inherit",
                boxShadow:"0 6px 20px rgba(29,78,216,0.35)",
              }}>
                Get Started →
              </button>
              <div style={{ fontSize:"13px", color:tk.textLight, marginTop:"10px" }}>Takes about 3 minutes · 10 questions</div>
            </div>
          </div>
        )}

        {/* Questions */}
        {step > 0 && !done && currentQ && (
          <QuestionStep
            q={currentQ}
            value={answers[currentQ.id]}
            onChange={v => handleChange(currentQ.id, v)}
            onNext={handleNext}
            onBack={step > 1 ? handleBack : null}
            stepNum={step}
            total={visibleQs.length}
          />
        )}

        {/* Results */}
        {done && <ResultsPanel answers={answers} onRestart={handleRestart} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CMENavigator />);
</script>
</body>
</html>
