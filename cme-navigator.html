// ─── LOGIC ────────────────────────────────────────────────────────────────────

function deriveRecommendations(answers) {
  const a = answers;
  const recs = { primary:[], additional:[], moc:[], commendation:[], michigan:[], warnings:[] };

  const isRSS = a.activity_structure === "rss";
  const isSingle = a.activity_structure === "single";
  const fmt = a.delivery_format;
  const isHybrid = fmt === "hybrid";
  const isEnduring = fmt === "enduring";
  const isSimulation = fmt === "simulation";
  const isLive = fmt === "live";

  const hybridComponents = a.hybrid_components || [];
  const hasEnduringComponent = hybridComponents.includes("hybrid_enduring");
  const hasLivestreamComponent = hybridComponents.includes("hybrid_livestream");
  const hasBundledRecording = hybridComponents.includes("hybrid_enduring_bundled");
  const hasInPerson = hybridComponents.includes("hybrid_inperson") || (!isHybrid);

  const contentFocus = a.content_focus || [];
  const hasPiCME = contentFocus.includes("pi_cme_framework");
  const hasPatientSafety = contentFocus.includes("patient_safety");
  const hasQI = contentFocus.includes("qi_activity") || hasPiCME;

  // ── ACCME Activity Type Label (used in primary section) ──
  // Determine the correct ACCME label from the two independent dimensions
  let accmeType = "";
  let accmeNote = "";
  if (isRSS) {
    if (isLive) { accmeType = "RSS — Live"; accmeNote = "Each session is individually accredited under the series umbrella. Register the series in PARS as a Regularly Scheduled Series. Individual session dates must be logged."; }
    else if (isHybrid) { accmeType = "RSS — Hybrid"; accmeNote = "Each RSS session carries the hybrid format. Live + live-stream components share one RSS application. If sessions are recorded and released publicly, a separate Enduring Material application is required per release."; }
    else if (isEnduring) { accmeType = "RSS — Enduring Material"; accmeNote = "Rare format — a recurring self-paced series (e.g., monthly online modules). Register as Enduring Material; each module or release may need its own application entry."; }
    else if (isSimulation) { accmeType = "RSS — Simulation"; accmeNote = "Recurring simulation sessions. Register the series in PARS. Each session date must be logged individually."; }
  } else {
    if (isLive) { accmeType = "Live Activity"; accmeNote = "All in-person attendees receive credit for the same live event. Faculty disclosures must be complete before the event date."; }
    else if (isHybrid) { accmeType = "Live Activity (Hybrid)"; accmeNote = "See Hybrid Application Strategy below for details on single vs. dual applications."; }
    else if (isEnduring) { accmeType = "Enduring Material"; accmeNote = "Self-paced activity with no live component. Credit period typically cannot exceed 3 years from release date. Learners must complete evaluation before receiving credit."; }
    else if (isSimulation) { accmeType = "Live Activity (Simulation)"; accmeNote = "Simulation-based activities are accredited as live activities. Ensure faculty disclosures and COI are resolved before the session date."; }
  }

  // ── Primary: AMA PRA Category 1 ──
  recs.primary.push({
    id:"ama_cat1",
    label:"AMA PRA Category 1 Credit™",
    required:true,
    accmeType,
    description:"Core physician CME credit. Required for all accredited CME activities.",
    accmeNote,
    action: isHybrid
      ? "Submit via your accredited provider (MiCME/CloudCME). See Hybrid Activity notice below."
      : isRSS
        ? "Register the series in PARS as a Regularly Scheduled Series. Log each session date. Submit via MiCME/CloudCME."
        : "Apply via your accredited provider (MiCME/CloudCME) application.",
  });

  // ── RSS-specific notice ──
  if (isRSS) {
    recs.primary.push({
      id:"rss_notice",
      label:"📅 RSS Application Requirements",
      required:true,
      isRSSNotice:true,
      description:"Regularly Scheduled Series have specific ACCME and PARS requirements that differ from single events.",
      items:[
        { icon:"📋", heading:"Series Registration in PARS", body:"Register the entire series as a single Regularly Scheduled Series activity in ACCME PARS. The series receives one Activity ID, but individual session dates must all be logged. You do not file a separate application per session.", status:"required" },
        { icon:"🗓️", heading:"Session Logging", body:"Each session date must be entered in PARS individually (or batch-uploaded). Learners are credited per session attended, not for the series as a whole. Maintain accurate attendance records per session.", status:"required" },
        { icon:"📊", heading:"Evaluation", body:"Evaluation can be conducted at the session level or periodically across the series (e.g., quarterly or annually). ACCME requires that you evaluate the effectiveness of the series, not necessarily every individual session.", status:"info" },
        isHybrid ? { icon:"🔀", heading:"Hybrid RSS Sessions", body:"If sessions include a live-stream component, all live and live-streamed attendees for each session are covered under the single RSS application. If session recordings are released publicly beyond the original attendees, a separate Enduring Material application is required for those releases.", status:"advisory" } : null,
        { icon:"🎓", heading:"MOC Reporting for RSS", body:"For boards that use PARS (ABIM, ABA, ABFM, ABP, etc.), report learner completions per session. Diplomates accumulate MOC points across sessions attended. Some boards require a minimum number of sessions completed before awarding points — confirm with each applicable board.", status:"info" },
      ].filter(Boolean),
      action:"Register the series in ACCME PARS before the first session. Log session dates continuously. Maintain per-session attendance records for MOC reporting.",
    });
  }

  // ── Hybrid-specific notice ──
  if (isHybrid) {
    const componentList = [
      hasInPerson && "live in-person",
      hasLivestreamComponent && "live-streamed",
      hasEnduringComponent && "standalone enduring material (public release)",
      hasBundledRecording && "recorded access for registered attendees only",
    ].filter(Boolean);
    recs.primary.push({
      id:"hybrid_notice",
      label:"🔀 Hybrid Activity — Application Strategy",
      required:true,
      isHybridNotice:true,
      components: componentList,
      description: isRSS
        ? "Each hybrid RSS session combines in-person and live-stream audiences under the single series registration. A separate Enduring Material application is only needed if session recordings are released publicly to new audiences."
        : "Hybrid activities span multiple ACCME activity types. The live and live-streamed components share a single live application. A separately released enduring recording requires its own distinct application.",
      items:[
        { icon:"🏛️📡", heading: isRSS ? "RSS Application — In-person + Live-stream Sessions" : "Application 1 — Live Activity (in-person + live-stream)", body: isRSS ? "All in-person and simultaneously live-streamed attendees for each session are covered under the single RSS series registration. No separate application needed for the live-stream component." : "The in-person and simultaneously live-streamed audiences are considered a single live activity and covered under one CME application. Apply as a Live Activity. All faculty disclosures and COI resolution must be complete before the event date.", status:"required" },
        hasEnduringComponent ? { icon:"🎬", heading: isRSS ? "Enduring Material Application — Public Recording Releases" : "Application 2 — Enduring Material (public recording release)", body: isRSS ? "If RSS session recordings are released to a broader audience (beyond original registrants), each public release constitutes a separate Enduring Material activity requiring its own CME application, learning objectives review, updated disclosures, and credit designation." : "Once the recording is released to a broader audience beyond original registrants, it becomes a separate Enduring Material activity requiring its own CME application, learning objectives review, updated disclosures, and credit hours. Submit as a new Enduring activity with a distinct PARS Activity ID.", status:"required" } : null,
        hasBundledRecording ? { icon:"🔒", heading:"Recorded Access — Registered Attendees Only", body:"If the recording is available only to original registered attendees (not broadly released), it is generally treated as part of the original live activity — a separate enduring application is NOT required. However, if access extends beyond 30 days post-event or opens to new registrants, consult your accredited provider.", status:"advisory" } : null,
        { icon:"📋", heading:"Evaluation & MOC Reporting", body:"Run separate evaluations for live and enduring components, as participant populations differ. Each application has its own PARS Activity ID — report learner completions separately per activity.", status:"info" },
        { icon:"🏔️", heading:"Michigan (MiCME) Consideration", body:"Each application (live and enduring) must be submitted separately to MiCME. If the activity includes Michigan-mandated topics, designate those topics on both applications independently.", status:"info" },
      ].filter(Boolean),
      action: hasEnduringComponent
        ? isRSS
          ? "Use one RSS series registration for all live + live-stream sessions. File a separate Enduring Material application each time a session recording is released publicly."
          : "File two separate CME applications: (1) Live Activity covering in-person + live-stream, (2) Enduring Material for the public recording release. Both require independent faculty disclosures, evaluations, and PARS Activity IDs."
        : isRSS
          ? "Use one RSS series registration covering all live and live-streamed sessions."
          : "File one CME application as a Live Activity covering both in-person and live-streamed audiences. If the recording is later released publicly, file a second Enduring application at that time.",
    });
  }

  // ── Additional credits: ANCC, ACPE, AAPA, IPCE ──
  const profs = a.audience_professions || [];
  if (profs.includes("nurses")) recs.additional.push({ id:"ancc", label:"ANCC Contact Hours (Nursing CE)", icon:"🏥", description:"Enables nurses to earn CE credit for their licensure.", action:"Requires Joint Accreditation OR a separately ANCC-accredited provider to co-provide.", priority:"high" });
  if (profs.includes("pharmacists")) recs.additional.push({ id:"acpe", label:"ACPE Credit (Pharmacy CE)", icon:"💊", description:"Enables pharmacists to earn CPE credit.", action:"Requires Joint Accreditation status. Register activity in CPE Monitor.", priority:"high" });
  if (profs.includes("pas")) recs.additional.push({ id:"aapa", label:"AAPA Category 1 CME Credit (PA Credit)", icon:"👩‍⚕️", description:"Enables Physician Associates to earn mandatory CME credit.", action:"Designate via your jointly accredited provider or AAPA-recognized provider.", priority:"medium" });

  const profCount = profs.filter(p=>!["physicians","residents_fellows","students"].includes(p)).length;
  const hasIPCEPlanning = (a.planning_process||[]).includes("multi_prof");
  if (profCount >= 1 && hasIPCEPlanning) recs.additional.push({ id:"ipce", label:"IPCE Credit Mark (Interprofessional CE)", icon:"🤝", description:"Awarded when activity is both planned and delivered interprofessionally.", action:"Requires Joint Accreditation AND interprofessional planning committee. Apply for Joint Accreditation designation via IPCE credit mark.", priority:"high" });

  // ── PI CME / MOC Part IV ──
  if (hasPiCME || hasQI) {
    recs.additional.push({
      id:"pi_cme",
      label:"Performance Improvement CME (PI CME) / MOC Part IV",
      icon:"📈",
      description: hasPiCME
        ? "You have indicated this activity uses the PI CME framework. Three-stage AMA model: Stage A (learning about best practices), Stage B (implementing change in practice), Stage C (measuring and evaluating change). Earns MOC Part IV credit with ABIM, ABA, and ABP."
        : "Quality Improvement content may qualify for PI CME designation if structured using the AMA three-stage framework. Consider designing the activity accordingly to unlock MOC Part IV credit.",
      action:"Design the activity using the AMA PI CME three-stage framework. Register for MOC Part IV credit in ACCME PARS for applicable boards. Requires structured data collection to demonstrate practice change.",
      priority:"high"
    });
  }

  // ── MOC ──
  const specialtyMocMap = { internal_med:["abim"], anesthesiology:["aba"], family_med:["abfm"], pediatrics:["abp"], psychiatry_neuro:["abpn"], surgery:["abos","abs","abts"], ob_gyn:["abog"], radiology:["abr"], emergency_med:["abem"], multi_specialty:["abim","abfm","abp","abpn"], other_specialty:[] };
  const applicableBoards = specialtyMocMap[a.target_specialty] || [];
  const evalMethod = a.evaluation_plan;
  const hasPrePost = evalMethod === "pre_post";
  const hasOutcomesEval = ["performance_outcome","patient_outcome"].includes(evalMethod);
  const hasSelfAssessment = evalMethod === "self_assessment_format";
  const hasSurveyOnly = evalMethod === "survey_only";

  applicableBoards.forEach(boardId => {
    const board = MOC_BOARDS.find(b=>b.id===boardId);
    if (!board) return;
    const conditions = [];
    const alerts = [];

    // RSS-specific MOC note
    if (isRSS) {
      conditions.push({ type:"info", text:`ℹ️ RSS MOC Reporting: Diplomates accumulate ${board.name} MOC credit per session attended. Report completions per session in PARS using the series Activity ID. Confirm minimum session requirements with ${board.name} if applicable.` });
    }

    if (board.id === "abim") {
      if (hasPrePost || hasOutcomesEval) conditions.push({ type:"ok", text:"✅ Evaluation method meets ABIM MOC requirements (pre/post assessment or outcomes measure present)" });
      else if (hasSelfAssessment) conditions.push({ type:"ok", text:"✅ Self-assessment component present — qualifies for ABIM MOC" });
      else alerts.push({ type:"warn", text:"⚠️ ABIM REQUIRES a pre/post knowledge assessment or outcomes measure — a satisfaction survey alone does NOT qualify. You must add a pre/post test or outcomes evaluation." });
      if (board.peerReview) conditions.push({ type:"info", text:"ℹ️ Peer review by ≥2 reviewers (not the authors) is required for ABIM MOC designation." });
      conditions.push({ type:"info", text:"ℹ️ A minimum participation threshold must be defined and feedback provided to learners after the activity." });
    } else if (board.id === "aba") {
      conditions.push({ type:"ok", text:"✅ ABA MOCA 2.0® Lifelong Learning credit does NOT require a pre/post test — standard ACCME-accredited CME with any evaluation qualifies." });
      if (hasSurveyOnly) conditions.push({ type:"ok", text:"✅ A satisfaction survey is acceptable for standard MOCA 2.0® Lifelong Learning credit." });
      if (hasPatientSafety) conditions.push({ type:"highlight", text:"🛡️ Patient Safety CME Credit available — tag in PARS and select ABA MOCA Content Outline topic area. Learners self-report using 8-digit ABA ID (begins with '3')." });
      else conditions.push({ type:"info", text:"ℹ️ If this activity includes cross-disciplinary patient safety themes, it could qualify for the separate ABA MOCA 2.0® Patient Safety CME Credit designation." });
      if (hasQI) conditions.push({ type:"highlight", text:"📊 MOCA 2.0® Type 4 Quality Improvement credit also available — register for MOC Part IV in PARS." });
    } else if (board.id === "abfm") {
      conditions.push({ type:"ok", text:"✅ ABFM does not require a pre/post test. Standard accredited CME qualifies automatically." });
      if (!isRSS) conditions.push({ type:"info", text:"ℹ️ For multi-session activities, ABFM requires diplomates to complete ALL sessions to collect MOC points — partial credit is not awarded." });
    } else if (board.id === "abp") {
      conditions.push({ type:"ok", text:"✅ ABP does not require a pre/post test for standard Lifelong Learning MOC credit." });
      conditions.push({ type:"info", text:"ℹ️ ABP Part II points are automatically transmitted to diplomate portfolios within 30 days of provider reporting completion in PARS." });
      if (hasPatientSafety) conditions.push({ type:"highlight", text:"🛡️ ABP Patient Safety credit available — tag appropriately in PARS." });
    } else if (board.id === "abpn") {
      conditions.push({ type:"ok", text:"✅ ABPN does not require a pre/post test for standard CME credit toward the 90-credit/3-year requirement." });
      if (hasSelfAssessment) conditions.push({ type:"highlight", text:"⭐ Self-assessment component present — may satisfy part of the 16-credit self-assessment requirement within ABPN's CC cycle." });
      else conditions.push({ type:"info", text:"ℹ️ 16 of ABPN's 90 required credits per 3-year cycle must include a self-assessment component. Adding one would broaden this activity's value." });
      if (hasPatientSafety) conditions.push({ type:"highlight", text:"🛡️ ABPN requires one patient safety activity per diplomate career — this activity may qualify if it meets ABPN-approved criteria." });
    } else {
      conditions.push({ type:"ok", text:`✅ ${board.name} does not require a pre/post test for standard CME credit. Standard accredited CME qualifies.` });
    }

    recs.moc.push({ id:`moc_${boardId}`, board:board.name, full:board.full, mocLabel:board.mocLabel, mocaName:board.mocaName, conditions, alerts, action:board.action, pars:board.pars, patientSafetyEligible:hasPatientSafety&&board.patientSafety, qiEligible:hasQI });
  });

  // ABA Patient Safety as standalone additional credit
  if (a.target_specialty === "anesthesiology" && hasPatientSafety) {
    recs.additional.push({ id:"aba_ps", label:"ABA MOCA 2.0® Patient Safety CME Credit", icon:"🛡️", description:"A distinct designation within MOCA 2.0® for activities addressing cross-disciplinary patient safety themes. Separate from — and in addition to — standard MOCA Lifelong Learning credit.", action:"Tag the activity as Patient Safety CME in ACCME PARS. Select ≥1 topic area from the ABA MOCA Content Outline. Learners must self-report using their 8-digit ABA ID (begins with '3') at theaba.org.", priority:"high" });
  }

  // ── Commendation ──
  const allTriggers = [...contentFocus, ...(a.planning_process||[]), ...(a.follow_up||[]), a.delivery_format, a.evaluation_plan].filter(Boolean);
  COMMENDATION_CRITERIA.forEach(cat => {
    cat.criteria.forEach(c => {
      if (c.triggers.some(t=>allTriggers.includes(t))) recs.commendation.push({ ...c, category:cat.category, color:cat.color, required:cat.required });
    });
  });

  // ── Michigan topics ──
  const miTopics = a.michigan_topics || [];
  if (miTopics.includes("mi_ethics")) recs.michigan.push({ label:"Medical Ethics", hours:"≥ 1 hr", note:"Tag/flag in MiCME submission as Ethics credit. Required for Michigan physician licensure renewal.", icon:"⚕️" });
  if (miTopics.includes("mi_pain")) recs.michigan.push({ label:"Pain & Symptom Management", hours:"≥ 3 hrs (incl. ≥1 hr controlled substances)", note:"Designate in MiCME. At least 1 hour must explicitly cover controlled substance prescribing.", icon:"💊" });
  if (miTopics.includes("mi_implicit_bias")) recs.michigan.push({ label:"Implicit Bias Training", hours:"1 hr per year of license cycle", note:"Document separately in MiCME. Fulfills requirement for Michigan license renewal cycles starting June 1, 2021.", icon:"🤝" });
  if (miTopics.includes("mi_opioid")) recs.michigan.push({ label:"Opioid/Controlled Substance Awareness", hours:"Required every renewal period (from May 28, 2024)", note:"Required for prescribers/dispensers. Flag in MiCME application. Confirm with LARA at renewal.", icon:"🚨" });
  if (miTopics.includes("mi_human_trafficking")) recs.michigan.push({ label:"Human Trafficking Identification", hours:"One-time training", note:"One-time requirement per physician career. Document completion in license renewal records.", icon:"🔴" });

  // ── Warnings ──
  if (!["pre_post","performance_outcome","patient_outcome","self_assessment_format"].includes(evalMethod) && applicableBoards.includes("abim")) {
    recs.warnings.push("ABIM MOC requires a pre/post knowledge assessment or outcomes measure — a satisfaction survey alone does not qualify. See the MOC section for details.");
  }
  if (profCount >= 1 && !hasIPCEPlanning) recs.warnings.push("Multiple professions will attend, but the planning committee is not interprofessional. Consider adding non-physician planners to qualify for IPCE designation.");
  if (isRSS && isEnduring) recs.warnings.push("An RSS of enduring materials is an uncommon format. Confirm with your accredited provider whether this should be registered as one Enduring Material series or individual applications per module.");
  if (a.target_specialty === "anesthesiology" && !hasPatientSafety) recs.warnings.push("For ABA MOCA 2.0®: if any content addresses cross-disciplinary patient safety topics, consider applying for the separate ABA Patient Safety CME Credit designation in addition to standard MOCA Lifelong Learning credit.");
  if (isHybrid && hasEnduringComponent) recs.warnings.push(isRSS ? "Your hybrid RSS includes publicly released recordings — each public recording release requires a separate Enduring Material CME application." : "Your hybrid activity includes a public recording release — this requires TWO separate CME applications: one Live Activity and one Enduring Material.");
  if (isHybrid && !hybridComponents.length) recs.warnings.push("Please confirm which hybrid components your activity includes — this affects whether one or two CME applications are required.");

  return recs;
}

// ─── UI COMPONENTS ────────────────────────────────────────────────────────────

const colors = { bg:"#0b1929", surface:"rgba(255,255,255,0.04)", border:"rgba(255,255,255,0.09)", accent:"#2563eb", accentLight:"rgba(37,99,235,0.15)", text:"#dce8f5", muted:"#6b8aaa", heading:"#ffffff" };

function Badge({ children, color=colors.accent }) {
  return <span style={{ display:"inline-block", background:color+"22", color, border:`1px solid ${color}44`, borderRadius:"12px", padding:"2px 10px", fontSize:"11px", fontWeight:"700", letterSpacing:"0.4px", textTransform:"uppercase" }}>{children}</span>;
}

function Card({ children, style={}, accent }) {
  return <div style={{ background:colors.surface, border:`1px solid ${accent?accent+"33":colors.border}`, borderRadius:"14px", padding:"20px 24px", borderLeft:accent?`4px solid ${accent}`:undefined, ...style }}>{children}</div>;
}

function getVisibleQuestions(answers) {
  return QUESTIONS.filter(q => !q.showIf || q.showIf(answers));
}

function QuestionStep({ q, value, onChange, onNext, onBack, stepNum, total }) {
  const isMulti = q.type === "multi";
  const selected = isMulti ? (value || []) : value;
  const canProceed = isMulti ? (selected && selected.length > 0) : !!selected;
  const toggle = (v) => {
    if (!isMulti) { onChange(v); return; }
    if (selected.includes(v)) onChange(selected.filter(x=>x!==v));
    else onChange([...selected, v]);
  };
  return (
    <div style={{ animation:"fadeIn 0.25s ease" }}>
      <div style={{ marginBottom:"6px" }}><span style={{ fontSize:"12px", color:colors.muted, letterSpacing:"1px", textTransform:"uppercase" }}>Step {stepNum} of {total}</span></div>
      <h2 style={{ margin:"0 0 6px", fontSize:"20px", fontWeight:"700", color:colors.heading, lineHeight:1.3 }}>{q.question}</h2>
      {q.hint && <p style={{ margin:"0 0 20px", fontSize:"13px", color:colors.muted, lineHeight:1.6 }}>{q.hint}</p>}
      {isMulti && <p style={{ margin:"0 0 12px", fontSize:"12px", color:colors.accent }}>Select all that apply</p>}
      <div style={{ display:"flex", flexDirection:"column", gap:"8px", marginBottom:"24px" }}>
        {q.options.map(opt => {
          const active = isMulti ? selected.includes(opt.value) : selected === opt.value;
          const isHighlighted = opt.highlight && !active;
          return (
            <button key={opt.value} onClick={()=>toggle(opt.value)} style={{ display:"flex", alignItems:"center", gap:"12px", padding:"13px 16px", borderRadius:"10px", border:active?`2px solid ${colors.accent}`:isHighlighted?`2px solid rgba(245,158,11,0.4)`:`2px solid ${colors.border}`, background:active?colors.accentLight:isHighlighted?"rgba(245,158,11,0.06)":"rgba(255,255,255,0.02)", color:active?"#a5c4f5":colors.text, cursor:"pointer", fontFamily:"inherit", fontSize:"14px", textAlign:"left", transition:"all 0.15s" }}>
              <span style={{ width:"18px", height:"18px", borderRadius:isMulti?"4px":"50%", border:`2px solid ${active?colors.accent:colors.muted}`, background:active?colors.accent:"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontSize:"10px", color:"#fff" }}>{active?"✓":""}</span>
              {opt.icon && <span style={{ fontSize:"16px" }}>{opt.icon}</span>}
              <span style={{ flex:1 }}>{opt.label}</span>
              {isHighlighted && <span style={{ fontSize:"10px", color:"#f59e0b", border:"1px solid rgba(245,158,11,0.35)", borderRadius:"8px", padding:"1px 7px", flexShrink:0 }}>NEW</span>}
            </button>
          );
        })}
      </div>
      <div style={{ display:"flex", gap:"12px" }}>
        {onBack && <button onClick={onBack} style={{ padding:"10px 20px", borderRadius:"8px", border:`1px solid ${colors.border}`, background:"transparent", color:colors.muted, cursor:"pointer", fontFamily:"inherit", fontSize:"14px" }}>← Back</button>}
        <button onClick={onNext} disabled={!canProceed} style={{ padding:"10px 28px", borderRadius:"8px", border:"none", background:canProceed?"linear-gradient(135deg,#2563eb,#1d4ed8)":"rgba(37,99,235,0.2)", color:canProceed?"#fff":colors.muted, cursor:canProceed?"pointer":"not-allowed", fontFamily:"inherit", fontSize:"14px", fontWeight:"700", boxShadow:canProceed?"0 4px 16px rgba(37,99,235,0.35)":"none", transition:"all 0.15s" }}>
          {stepNum === total ? "See My Recommendations →" : "Next →"}
        </button>
      </div>
    </div>
  );
}

function NoticeCard({ r, isRSS }) {
  const statusColors = { required:"#2563eb", advisory:"#f59e0b", info:colors.muted };
  const statusBg = { required:"rgba(37,99,235,0.1)", advisory:"rgba(245,158,11,0.08)", info:"rgba(255,255,255,0.03)" };
  const statusBorder = { required:"rgba(37,99,235,0.25)", advisory:"rgba(245,158,11,0.25)", info:colors.border };
  const accentColor = r.isRSSNotice ? "#06b6d4" : "#f59e0b";
  const headerBg = r.isRSSNotice ? "rgba(6,182,212,0.1)" : "rgba(245,158,11,0.1)";
  const headerBorder = r.isRSSNotice ? "rgba(6,182,212,0.2)" : "rgba(245,158,11,0.2)";
  const titleColor = r.isRSSNotice ? "#22d3ee" : "#fbbf24";
  const subtitleColor = r.isRSSNotice ? "#0891b2" : "#d97706";
  const actionBg = r.isRSSNotice ? "rgba(6,182,212,0.08)" : "rgba(245,158,11,0.08)";
  const actionColor = r.isRSSNotice ? "#67e8f9" : "#fcd34d";

  return (
    <Card accent={accentColor} style={{ padding:"0", overflow:"hidden" }}>
      <div style={{ background:headerBg, borderBottom:`1px solid ${headerBorder}`, padding:"14px 20px", display:"flex", alignItems:"center", gap:"10px" }}>
        <span style={{ fontSize:"20px" }}>{r.isRSSNotice ? "📅" : "🔀"}</span>
        <div style={{ flex:1 }}>
          <div style={{ fontWeight:"700", fontSize:"15px", color:titleColor }}>{r.isRSSNotice ? "RSS Application Requirements" : "Hybrid Activity — Application Strategy"}</div>
          {r.components && <div style={{ fontSize:"12px", color:subtitleColor, marginTop:"2px" }}>Components: {r.components.join(" + ")}</div>}
        </div>
        <Badge color={accentColor}>Required</Badge>
      </div>
      <div style={{ padding:"16px 20px" }}>
        <p style={{ margin:"0 0 14px", fontSize:"13px", color:colors.text, lineHeight:1.7 }}>{r.description}</p>
        <div style={{ display:"flex", flexDirection:"column", gap:"10px" }}>
          {r.items.map((item,i)=>(
            <div key={i} style={{ background:statusBg[item.status], border:`1px solid ${statusBorder[item.status]}`, borderRadius:"10px", padding:"12px 16px" }}>
              <div style={{ display:"flex", gap:"8px", alignItems:"flex-start" }}>
                <span style={{ fontSize:"15px", flexShrink:0, marginTop:"1px" }}>{item.icon}</span>
                <div>
                  <div style={{ fontWeight:"700", fontSize:"13px", color:statusColors[item.status], marginBottom:"4px" }}>{item.heading}</div>
                  <div style={{ fontSize:"12.5px", color:colors.text, lineHeight:1.65 }}>{item.body}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
        <div style={{ background:actionBg, borderRadius:"8px", padding:"10px 14px", fontSize:"12px", color:actionColor, marginTop:"14px" }}>
          <strong>Action:</strong> {r.action}
        </div>
      </div>
    </Card>
  );
}

function ResultsPanel({ answers, onRestart }) {

  const [openSection, setOpenSection] = useState("primary");

    { id:"primary", label:"Required Credits", icon:"📋", count:recs.primary.length },

    { id:"moc", label:"MOC / Board Certification", icon:"🎓", count:recs.moc.length },
    { id:"commendation", label:"Commendation Opportunities", icon:"⭐", count:recs.commendation.length },

  return (
    <div style={{ animation:"fadeIn 0.3s ease" }}>
      <div style={{ marginBottom:"24px" }}>
        <Badge color="#22c55e">Application Navigator Results</Badge>
        <h2 style={{ margin:"10px 0 6px", fontSize:"22px", fontWeight:"700", color:colors.heading }}>Your CME Credit Roadmap</h2>
        <p style={{ margin:0, fontSize:"13px", color:colors.muted }}>Based on your activity details — apply for all items below when submitting your CME application.</p>

              <div style={{ fontWeight:"700", color:"#fbbf24", marginBottom:"6px", fontSize:"13px", textTransform:"uppercase", letterSpacing:"0.5px" }}>Action Needed</div>
              {recs.warnings.map((w,i)=><p key={i} style={{ margin:"0 0 4px", fontSize:"13px", color:"#fcd34d", lineHeight:1.5 }}>• {w}</p>)}

          {recs.primary.map(r => {
            if (r.isHybridNotice || r.isRSSNotice) return <NoticeCard key={r.id} r={r} />;

                    {r.accmeType && <div style={{ fontSize:"12px", color:"#86efac", marginTop:"3px" }}>ACCME Type: <strong>{r.accmeType}</strong></div>}

          })}

      {openSection === "additional" && (

          {recs.additional.length === 0 && <Card><p style={{ color:colors.muted, margin:0 }}>No additional credit types identified based on your activity profile.</p></Card>}
          {recs.additional.map(r=>(
            <Card key={r.id} accent={r.priority==="high"?"#f59e0b":colors.accent}>

                <Badge color={r.priority==="high"?"#f59e0b":colors.accent}>{r.priority==="high"?"Recommended":"Optional"}</Badge>
              </div>
              <p style={{ margin:"0 0 8px", fontSize:"13px", color:colors.text, lineHeight:1.6 }}>{r.description}</p>
              <div style={{ background:"rgba(37,99,235,0.08)", borderRadius:"8px", padding:"10px 14px", fontSize:"12px", color:"#93c5fd" }}><strong>Action:</strong> {r.action}</div>
            </Card>
          ))}
        </div>
      )}

      {openSection === "moc" && (
        <div>
          <p style={{ fontSize:"13px", color:colors.muted, marginBottom:"16px", lineHeight:1.6 }}>Based on your target specialty, the following board MOC programs are applicable. Register activities in <strong style={{ color:colors.text }}>ACCME PARS</strong> — no separate board application required for PARS-participating boards.</p>
          <div style={{ display:"flex", flexDirection:"column", gap:"16px" }}>
            {recs.moc.map(r=>(
              <Card key={r.id} accent="#7c3aed">

                  <div style={{ display:"flex", gap:"6px", flexWrap:"wrap", justifyContent:"flex-end" }}>

                    {r.patientSafetyEligible && <Badge color="#ef4444">Patient Safety</Badge>}
                    {r.qiEligible && <Badge color="#06b6d4">MOC Part IV</Badge>}
                  </div>
                </div>
                <div style={{ fontSize:"12px", color:colors.muted, marginBottom:"14px" }}>{r.full}</div>
                {r.alerts&&r.alerts.map((alert,i)=><div key={i} style={{ background:"rgba(245,158,11,0.1)", border:"1px solid rgba(245,158,11,0.3)", borderRadius:"8px", padding:"10px 14px", marginBottom:"8px", fontSize:"13px", color:"#fcd34d", lineHeight:1.6 }}>{alert.text}</div>)}
                <div style={{ display:"flex", flexDirection:"column", gap:"6px", marginBottom:"12px" }}>
                  {r.conditions&&r.conditions.map((c,i)=>{
                    const bgMap={ok:"rgba(34,197,94,0.08)",warn:"rgba(245,158,11,0.08)",info:"rgba(255,255,255,0.04)",highlight:"rgba(124,58,237,0.1)"};
                    const colorMap={ok:"#86efac",warn:"#fcd34d",info:colors.muted,highlight:"#c4b5fd"};
                    const borderMap={ok:"rgba(34,197,94,0.2)",warn:"rgba(245,158,11,0.2)",info:colors.border,highlight:"rgba(124,58,237,0.3)"};
                    return <div key={i} style={{ background:bgMap[c.type]||bgMap.info, border:`1px solid ${borderMap[c.type]||borderMap.info}`, borderRadius:"8px", padding:"9px 13px", fontSize:"13px", color:colorMap[c.type]||colorMap.info, lineHeight:1.6 }}>{c.text}</div>;
                  })}
                </div>
                <div style={{ background:"rgba(124,58,237,0.08)", borderRadius:"8px", padding:"10px 14px", fontSize:"12px", color:"#c4b5fd" }}><strong>Action:</strong> {r.action}</div>
              </Card>
            ))}
          </div>
        </div>
      )}

      {openSection === "commendation" && (
        <div>
          <Card style={{ marginBottom:"16px", background:"rgba(220,38,38,0.06)", borderColor:"rgba(220,38,38,0.2)" }}>
            <div style={{ fontSize:"13px", color:"#fca5a5", lineHeight:1.7 }}>
              <strong style={{ color:"#f87171" }}>ℹ About Accreditation with Commendation:</strong> To qualify, your organization must comply with <strong>8 criteria</strong> total — any 7 from the menu plus at least <strong>1 from "Achieves Outcomes" (C36–C38)</strong>. These are organizational criteria, not individual activity requirements — but activities like this one can serve as evidence.
            </div>
          </Card>
          {COMMENDATION_CRITERIA.map(cat=>{
            const matched = recs.commendation.filter(c=>c.category===cat.category);
            if (matched.length===0) return null;
            return (
              <div key={cat.category} style={{ marginBottom:"18px" }}>
                <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"10px" }}>
                  <div style={{ width:"10px", height:"10px", borderRadius:"50%", background:cat.color }} />
                  <span style={{ fontSize:"12px", fontWeight:"700", color:cat.color, textTransform:"uppercase", letterSpacing:"0.5px" }}>{cat.category}</span>
                  {cat.required && <Badge color="#dc2626">Must include ≥1 from this category</Badge>}
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
                  {matched.map(c=>(
                    <Card key={c.id} accent={cat.color} style={{ padding:"14px 18px" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                        <div>
                          <span style={{ fontWeight:"700", color:colors.heading, fontSize:"14px" }}>⭐ {c.code}: {c.label}</span>
                          <p style={{ margin:"4px 0 0", fontSize:"13px", color:colors.text, lineHeight:1.5 }}>{c.desc}</p>
                        </div>
                        <Badge color={cat.color}>Eligible</Badge>
                      </div>
                    </Card>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {openSection === "michigan" && recs.michigan.length > 0 && (
        <div>
          <Card style={{ marginBottom:"16px", background:"rgba(37,99,235,0.06)", borderColor:"rgba(37,99,235,0.2)" }}>
            <div style={{ fontSize:"13px", color:"#93c5fd", lineHeight:1.7 }}>
              <strong>Michigan Board of Medicine Requirement:</strong> These topics must be designated in MiCME at submission. Physicians must complete 150 CME credits per 3-year cycle (≥75 AMA Category 1). The items below fulfill specific mandatory topic requirements within that cycle.
            </div>
          </Card>
          <div style={{ display:"flex", flexDirection:"column", gap:"10px" }}>
            {recs.michigan.map((m,i)=>(
              <Card key={i} accent="#2563eb">
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"6px" }}>
                  <div style={{ fontWeight:"700", fontSize:"15px", color:colors.heading }}>{m.icon} {m.label}</div>
                  <Badge color="#2563eb">{m.hours}</Badge>
                </div>
                <p style={{ margin:0, fontSize:"13px", color:colors.text, lineHeight:1.6 }}>{m.note}</p>
              </Card>
            ))}
          </div>
        </div>
      )}

      <div style={{ marginTop:"28px" }}>
        <div style={{ fontSize:"13px", fontWeight:"700", color:colors.muted, textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:"14px" }}>Application Submission Checklist</div>
        <Card>
          {[
            { done:true, text:"Submit base CME application (AMA PRA Category 1 Credit) via MiCME or CloudCME" },
            { done:recs.additional.length>0, text:`Apply for additional credits: ${recs.additional.map(r=>r.label).join(", ")||"N/A"}` },
            { done:recs.moc.length>0, text:`Register for MOC in ACCME PARS: ${recs.moc.map(r=>r.board).join(", ")||"N/A"}` },
            { done:answers.planning_process?.includes("needs_assessment"), text:"Attach needs assessment / gap analysis documentation" },
            { done:!["survey_only"].includes(answers.evaluation_plan), text:"Include pre/post assessment or outcomes measure in evaluation plan" },
            { done:recs.michigan.length>0, text:`Flag Michigan mandatory topics in MiCME: ${recs.michigan.map(m=>m.label).join(", ")||"N/A"}` },
            { done:recs.commendation.length>0, text:"Preserve documentation of activity as evidence toward Commendation criteria" },
            { done:true, text:"Collect and submit faculty disclosure forms prior to activity" },
          ].map((item,i)=>(
            <div key={i} style={{ display:"flex", gap:"10px", alignItems:"flex-start", padding:"8px 0", borderBottom:i<7?`1px solid ${colors.border}`:"none" }}>
              <span style={{ fontSize:"14px", flexShrink:0, marginTop:"1px" }}>{item.done?"✅":"⬜"}</span>
              <span style={{ fontSize:"13px", color:item.done?colors.text:colors.muted, lineHeight:1.5 }}>{item.text}</span>
            </div>
          ))}
        </Card>
      </div>

      <div style={{ marginTop:"24px", display:"flex", gap:"12px" }}>
        <button onClick={onRestart} style={{ padding:"10px 22px", borderRadius:"8px", border:`1px solid ${colors.border}`, background:"transparent", color:colors.muted, cursor:"pointer", fontFamily:"inherit", fontSize:"14px" }}>← Start Over</button>
        <button onClick={()=>window.print()} style={{ padding:"10px 22px", borderRadius:"8px", border:`1px solid ${colors.accent}44`, background:colors.accentLight, color:"#93c5fd", cursor:"pointer", fontFamily:"inherit", fontSize:"14px" }}>🖨 Print / Save Results</button>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

function CMENavigator() {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [done, setDone] = useState(false);

  const visibleQs = getVisibleQuestions(answers);
  const currentQ = visibleQs[step-1];

  const handleNext = () => { if (step===visibleQs.length) { setDone(true); return; } setStep(s=>s+1); };
  const handleBack = () => setStep(s=>s-1);
  const handleRestart = () => { setStep(0); setAnswers({}); setDone(false); };

  const handleChange = (qId, value) => {
    setAnswers(prev => {
      const next = {...prev, [qId]:value};
      // Clear hybrid components if format changes away from hybrid
      if (qId==="delivery_format" && value!=="hybrid") delete next.hybrid_components;
      return next;
    });
  };

  const isRSS = answers.activity_structure === "rss";
  const isHybrid = answers.delivery_format === "hybrid";

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(160deg,#070f1f 0%,#0b1929 60%,#0d1f36 100%)", fontFamily:"'Georgia','Times New Roman',serif", color:colors.text }}>
      <div style={{ borderBottom:`1px solid ${colors.border}`, padding:"16px 32px", display:"flex", alignItems:"center", gap:"14px", background:"rgba(0,0,0,0.2)", backdropFilter:"blur(8px)", position:"sticky", top:0, zIndex:50 }}>
        <div style={{ width:"34px", height:"34px", background:"linear-gradient(135deg,#2563eb,#1e40af)", borderRadius:"8px", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"18px" }}>⚕</div>
        <div>
          <div style={{ fontWeight:"700", fontSize:"16px", color:"#fff", letterSpacing:"-0.2px" }}>CME Credit Application Navigator</div>
          <div style={{ fontSize:"11px", color:colors.muted, letterSpacing:"0.4px" }}>MiCME · CloudCME · ACCME · MOC · IPCE</div>
        </div>
        {step > 0 && !done && (
          <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:"8px" }}>
            {isRSS && <span style={{ fontSize:"11px", color:"#22d3ee", border:"1px solid rgba(6,182,212,0.3)", borderRadius:"10px", padding:"2px 8px", background:"rgba(6,182,212,0.08)" }}>📅 RSS</span>}
            {isHybrid && <span style={{ fontSize:"11px", color:"#f59e0b", border:"1px solid rgba(245,158,11,0.3)", borderRadius:"10px", padding:"2px 8px", background:"rgba(245,158,11,0.08)" }}>🔀 Hybrid</span>}
            <div style={{ display:"flex", gap:"4px" }}>
              {visibleQs.map((_,i)=><div key={i} style={{ width:"22px", height:"4px", borderRadius:"2px", background:i<step?colors.accent:colors.border, transition:"all 0.3s" }} />)}
            </div>
          </div>
        )}
      </div>

      <div style={{ maxWidth:"680px", margin:"0 auto", padding:"40px 24px" }}>
        {step === 0 && (
          <div style={{ animation:"fadeIn 0.4s ease", textAlign:"center" }}>
            <div style={{ fontSize:"48px", marginBottom:"20px" }}>🧭</div>
            <h1 style={{ margin:"0 0 14px", fontSize:"28px", fontWeight:"700", color:"#fff", lineHeight:1.2 }}>CME Credit Application Navigator</h1>
            <p style={{ margin:"0 auto 16px", fontSize:"15px", color:colors.text, lineHeight:1.8, maxWidth:"520px" }}>Answer a few focused questions about your planned activity. The navigator will tell you exactly which CME credits to apply for — including designations you may not have considered.</p>
            <div style={{ display:"flex", flexWrap:"wrap", justifyContent:"center", gap:"8px", marginBottom:"32px" }}>
              {["AMA PRA Category 1","MOC / MOCA 2.0®","IPCE / Joint Accreditation","ANCC · ACPE · AAPA","PI CME / MOC Part IV","ABA Patient Safety","Single Event & RSS","Hybrid Activities","ACCME Commendation","Michigan Mandatory Topics"].map(t=>(
                <span key={t} style={{ fontSize:"11px", color:colors.muted, border:`1px solid ${colors.border}`, borderRadius:"12px", padding:"3px 10px" }}>{t}</span>
              ))}
            </div>
            <button onClick={()=>setStep(1)} style={{ padding:"14px 40px", borderRadius:"10px", border:"none", background:"linear-gradient(135deg,#2563eb,#1d4ed8)", color:"#fff", fontSize:"16px", fontWeight:"700", cursor:"pointer", fontFamily:"inherit", boxShadow:"0 6px 24px rgba(37,99,235,0.45)" }}>
              Begin Navigation →
            </button>
          </div>
        )}
        {step > 0 && !done && currentQ && (
          <QuestionStep q={currentQ} value={answers[currentQ.id]} onChange={v=>handleChange(currentQ.id,v)} onNext={handleNext} onBack={step>1?handleBack:null} stepNum={step} total={visibleQs.length} />
        )}
        {done && <ResultsPanel answers={answers} onRestart={handleRestart} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CMENavigator />);
</script>
</body>
</html>
